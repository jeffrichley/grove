# Codex integration pack: repo-root AGENTS.md shim and future Codex surfaces.

id = "codex"
name = "Codex Integration Pack"
version = "0.1.0"
depends_on = ["base"]
compatible_with = ["codex"]
activates_when = []

[contributes]

[[contributes.tool_hooks]]
id = "codex-agents-shim"
tool = "codex"
hook_type = "managed_block"
target = "AGENTS.md"
source = "hooks/agents.md.j2"
order = 10

[[contributes.codex_skills]]
id = "codex-planning-execution"
path = "planning-execution"
source = "skills/planning-execution/SKILL.md.j2"
order = 10

[[contributes.codex_skills]]
id = "codex-memory-writeback"
path = "memory-writeback"
source = "skills/memory-writeback/SKILL.md.j2"
order = 20

[[contributes.doctor_checks]]
id = "codex-planning-execution-front-matter"
check_type = "skill_front_matter"
description = "Codex planning-execution skill must include required front matter."
tool = "codex"
skill_path = "planning-execution"
required_front_matter = ["name", "description"]
order = 10

[[contributes.doctor_checks]]
id = "codex-memory-writeback-front-matter"
check_type = "skill_front_matter"
description = "Codex memory-writeback skill must include required front matter."
tool = "codex"
skill_path = "memory-writeback"
required_front_matter = ["name", "description"]
order = 20
